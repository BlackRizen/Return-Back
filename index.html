      }
      38% {
        transform: translateX(-10px) skewX(-3deg);
        filter: blur(3px);
        clip-path: inset(4% 0 7% 0);
      }
      62% {
        opacity: 0.75;
        transform: translateX(12px);
        filter: blur(6px);
        clip-path: inset(14% 0 18% 0);
      }
      100% {
        opacity: 0;
        transform: translateY(-10px) scale(1.02);
        filter: blur(12px);
        clip-path: inset(100% 0 0 0);
        visibility: hidden;
      }
    }
    @keyframes launchTextGlitch {
      0% {
        transform: translateX(-1px);
        text-shadow:
          2px 0 rgba(0,212,255,0.85),
          -2px 0 rgba(255,0,140,0.35);
      }
      100% {
        transform: translateX(1px);
        text-shadow:
          -2px 0 rgba(0,212,255,0.85),
          2px 0 rgba(255,0,140,0.35);
      }
    }
  `;
  document.head.appendChild(style);

  const overlay = document.createElement('div');
  overlay.id = 'websiteLaunchOverlay';
  overlay.innerHTML = `
    <div class="grid"></div>
    <div class="glow1"></div>
    <div class="glow2"></div>
    <div class="glow3"></div>

    <div class="launch-inner">
      <div class="intro-wrap">
        <div class="eyebrow">TRANSMISSION READY</div>
        <div class="title">RETURN BACK</div>
        <div class="subtitle">
          Start the mission, initialize fullscreen, and deploy the game sequence.
        </div>
        <button class="start-btn" id="websiteLaunchStartBtn">Start your journey</button>
        <div class="hint">Click here to initialize the game</div>
      </div>

      <div class="loading-wrap">
        <div class="loading-title">Initializing mission</div>
        <div class="bar">
          <div class="bar-fill" id="websiteLaunchBarFill"></div>
        </div>
        <div class="pct" id="websiteLaunchPct">0%</div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  function resumeAudio() {
    try {
      if (typeof Howler !== 'undefined' && Howler.ctx && Howler.ctx.state === 'suspended') {
        Howler.ctx.resume();
      }
    } catch (_) {}
  }

  function doResizeBursts() {
    try { window.dispatchEvent(new Event('resize')); } catch (_) {}
    setTimeout(() => { try { window.dispatchEvent(new Event('resize')); } catch (_) {} }, 120);
    setTimeout(() => { try { window.dispatchEvent(new Event('resize')); } catch (_) {} }, 450);
    setTimeout(() => { try { window.dispatchEvent(new Event('resize')); } catch (_) {} }, 1000);
  }

  function safeFullscreen() {
    const el = document.documentElement;
    if (!el || !el.requestFullscreen) return Promise.resolve(false);
    return el.requestFullscreen().then(() => true).catch(() => false);
  }

  function startGameNow() {
    try {
      window.__SKIP_GAME_FULLSCREEN = true;
      resumeAudio();

      const loader = document.getElementById('loaderScreen');
      if (loader) {
        loader.style.display = 'none';
        loader.style.opacity = '0';
        loader.style.pointerEvents = 'none';
      }

      const fadeOv = document.querySelector('.fade-overlay');
      if (fadeOv) {
        fadeOv.style.display = 'none';
        fadeOv.style.opacity = '0';
        fadeOv.style.pointerEvents = 'none';
      }

      const startScreen = document.getElementById('startScreen');
      if (startScreen) {
        startScreen.style.display = 'none';
        startScreen.style.visibility = 'hidden';
        startScreen.style.opacity = '0';
        startScreen.style.pointerEvents = 'none';
      }

      if (typeof window.boot === 'function') {
        window.boot();
      }

      try {
        if (typeof showTouch === 'function') showTouch();
        else document.body.classList.add('playing');
      } catch (_) {
        try { document.body.classList.add('playing'); } catch (__){}
      }

      doResizeBursts();
    } catch (_) {}
  }

  const startBtn = document.getElementById('websiteLaunchStartBtn');
  const fill = document.getElementById('websiteLaunchBarFill');
  const pct = document.getElementById('websiteLaunchPct');

  startBtn.addEventListener('click', async function () {
    await safeFullscreen();
    overlay.classList.add('loading');

    startGameNow();

    const duration = 3000;
    const stepMs = 30;
    const totalSteps = duration / stepMs;
    let currentStep = 0;

    const t = setInterval(() => {
      currentStep += 1;
      const progress = Math.min((currentStep / totalSteps) * 100, 100);
      fill.style.width = progress + '%';
      pct.textContent = Math.round(progress) + '%';

      if (currentStep >= totalSteps) {
        clearInterval(t);
        overlay.classList.add('glitch-out');
        setTimeout(() => {
          overlay.remove();
          doResizeBursts();
        }, 720);
      }
    }, stepMs);
  }, { once: true });
})();
</script>
</body>
</html>
