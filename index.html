</stop>
<stop offset="100%" stop-color="#1E7FE5">
</stop>
</lineargradient>
<lineargradient gradientunits="userSpaceOnUse" id="hotArcGrad" x1="0" x2="44" y1="0" y2="0">
<stop offset="0%" stop-color="#FFE777">
</stop>
<stop offset="55%" stop-color="#FFD400">
</stop>
<stop offset="100%" stop-color="#FFB100">
</stop>
</lineargradient>
</defs>
<circle class="track" cx="22" cy="22" fill="none" r="20" stroke-width="3">
</circle>
<circle fill="none" id="invisCooldownOutline" opacity="0.55" stroke="rgba(0,0,0,0.45)" stroke-linecap="round" stroke-width="3.6">

<circle class="arc" cx="22" cy="22" fill="none" id="invisCooldownArc" r="20" stroke-dasharray="125.66" stroke-dashoffset="125.66" stroke-linecap="round" stroke-width="3" transform="rotate(-90 22 22)">
</circle>
</svg>
